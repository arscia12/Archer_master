<!DOCTYPE html>
<html>
<head>
    <title>filagaming - admin panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0088ff; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #181818; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .log-box { background: #000; border: 1px solid #333; height: 300px; overflow-y: auto; padding: 10px; font-size: 12px; margin-bottom: 20px; border-radius: 5px; }
        .win-row { border-bottom: 1px solid #222; padding: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .main { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 25px; border-radius: 10px; border: 1px solid #333; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; box-sizing: border-box; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-nav { background: #333; color: #ccc; text-decoration: none; display: block; text-align: center; padding: 12px; margin-top: 10px; font-size: 13px; border-radius: 5px; font-weight: bold; }
        .section-label { font-size: 11px; color: #666; margin: 15px 0 5px 0; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--primary); text-align:center; margin-top:0;">filagaming admin</h2>
        
        <div class="section-label">Member Win History</div>
        <div id="winHistory" class="log-box">loading live wins...</div>

        <div class="section-label">Navigation</div>
        <a href="profile.html" class="btn-nav">VIEW MEMBER LIST</a>
        <a href="winners.html" class="btn-nav" style="background:#2e7d32; color:white;">WINNING IDS & REPLAYS</a>
    </div>

    <div class="main">
        <div class="card">
            <h3 style="margin-top:0; color:var(--primary);">COIN MANAGEMENT</h3>
            <input type="text" id="targetName" placeholder="member name (e.g. akuntest)">
            <input type="number" id="coinAmount" placeholder="amount (e.g. 1)">
            <button class="btn" onclick="updateCoins()">UPDATE BALANCE</button>
        </div>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAMnrO780tTvrJKbmavBbJ6ztRok-RUQnI",
  authDomain: "chatapp-53b95.firebaseapp.com",
  databaseURL: "https://chatapp-53b95-default-rtdb.firebaseio.com",
  projectId: "chatapp-53b95",
  storageBucket: "chatapp-53b95.firebasestorage.app",
  messagingSenderId: "407903743547",
  appId: "1:407903743547:web:7fc154a755b155125bb61e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LIVE LISTENER: Fixed to show multiple wins
db.ref('archery_wins').limitToLast(15).on('value', (snap) => {
    const box = document.getElementById("winHistory");
    if(!snap.exists()) { 
        box.innerHTML = "<div style='color:#444; text-align:center; padding-top:20px;'>no wins yet</div>"; 
        return; 
    }
    
    const wins = [];
    snap.forEach(c => {
        const data = c.val();
        wins.push(data);
    });

    // reverse() so the newest win is always at the top
    box.innerHTML = wins.reverse().map(w => `
        <div class="win-row">
            <span style="color:#0088ff; font-weight:bold;">${w.name}</span>
            <span style="color:${w.prize === 'ZONK' ? '#ff4444' : '#4caf50'}; font-size:11px;">${w.prize}</span>
        </div>
    `).join('');
});

function updateCoins() {
    const name = document.getElementById("targetName").value.trim().toLowerCase();
    const amt = parseInt(document.getElementById("coinAmount").value);
    
    if(!name || isNaN(amt)) {
        alert("Please enter a valid name and amount");
        return;
    }
    
    db.ref('wallets/' + name).transaction(curr => (curr || 0) + amt);
    
    // Create an audit log entry
    const logTime = new Date().toLocaleTimeString('en-GB', {hour12: false});
    db.ref('audit_logs').push({
        msg: `[${logTime}] added ${amt} coins to ${name}`
    });
    
    alert("Balance updated for " + name);
    document.getElementById("coinAmount").value = "";
}
</script>
</body>
</html>
