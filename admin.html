<!DOCTYPE html>
<html>
<head>
    <title>filagaming - admin firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0088ff; --bg: #121212; --sidebar: #1a1a1a; --text: #e0e0e0; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px; }
        .sidebar-header { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; text-align: center; }
        .sidebar-label { font-size: 12px; color: #777; margin-bottom: 8px; display: block; font-weight: 600; }
        .log-box { background: #080808; border-radius: 6px; height: 180px; overflow-y: auto; padding: 10px; font-size: 11px; font-family: monospace; border: 1px solid #222; margin-bottom: 15px; }
        .win-entry { display: flex; justify-content: space-between; margin-bottom: 5px; border-bottom: 1px solid #1a1a1a; padding-bottom: 3px; }
        .main-content { flex: 1; padding: 40px; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none; display: block; text-align: center; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-sidebar { background: #2a2a2a; color: #ddd; font-size: 13px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">filagaming admin</div>
        <span class="sidebar-label">live winning history</span>
        <div id="winHistory" class="log-box"></div>
        
        <span class="sidebar-label">navigation</span>
        <a href="profile.html" class="btn btn-sidebar">view member list</a>
        <a href="winners.html" class="btn btn-sidebar" style="background:#2e7d32;">winning ids & replays</a>
    </div>

    <div class="main-content">
        <div class="card">
            <h3 style="margin-top:0; color:var(--primary);">coin management</h3>
            <input type="text" id="targetMember" placeholder="member name...">
            <input type="number" id="coinAmount" placeholder="amount to add/remove">
            <button class="btn btn-primary" onclick="adjustCoins()">update balance</button>
        </div>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAMnrO780tTvrJKbmavBbJ6ztRok-RUQnI",
  authDomain: "chatapp-53b95.firebaseapp.com",
  projectId: "chatapp-53b95",
  storageBucket: "chatapp-53b95.firebasestorage.app",
  messagingSenderId: "407903743547",
  appId: "1:407903743547:web:7fc154a755b155125bb61e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Listen for wins LIVE
db.ref('archery_wins').limitToLast(15).on('value', (snap) => {
    const list = [];
    snap.forEach(child => list.push(child.val()));
    document.getElementById("winHistory").innerHTML = list.reverse().map(w => `
        <div class="win-entry">
            <span style="color:#0088ff;">${w.name}</span>
            <span style="color:${w.prize === 'ZONK' ? '#ff4444' : '#4caf50'};">${w.prize}</span>
        </div>
    `).join('');
});

function adjustCoins() {
    const name = document.getElementById("targetMember").value.trim().toLowerCase();
    const amt = parseInt(document.getElementById("coinAmount").value);
    if(!name || isNaN(amt)) return;
    
    db.ref('wallets/' + name).transaction((curr) => (curr || 0) + amt);
    alert("coins updated for " + name);
}
</script>
</body>
</html>
