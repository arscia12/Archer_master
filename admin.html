<!DOCTYPE html>
<html>
<head>
    <title>filagaming - admin panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0088ff; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; }
        .sidebar { width: 280px; background: #181818; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .log-box { background: #000; border: 1px solid #333; height: 250px; overflow-y: auto; padding: 10px; font-size: 12px; margin-bottom: 20px; border-radius: 5px; }
        .win-row { border-bottom: 1px solid #222; padding: 5px 0; display: flex; justify-content: space-between; }
        .main { flex: 1; padding: 40px; }
        .card { background: var(--card); padding: 25px; border-radius: 10px; border: 1px solid #333; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-nav { background: #333; color: #ccc; text-decoration: none; display: block; text-align: center; padding: 10px; margin-top: 10px; font-size: 13px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 style="color:var(--primary); text-align:center;">filagaming admin</h3>
        
        <p style="font-size:11px; color:#666; margin-bottom:5px;">MEMBER WIN HISTORY</p>
        <div id="winHistory" class="log-box">loading history...</div>

        <p style="font-size:11px; color:#666; margin-bottom:5px;">NAVIGATION</p>
        <a href="winners.html" class="btn-nav" style="background:#2e7d32; color:white;">VIEW WINNING IDS & REPLAYS</a>
    </div>

    <div class="main">
        <div class="card">
            <h3 style="margin-top:0;">COIN MANAGEMENT</h3>
            <input type="text" id="targetName" placeholder="member name...">
            <input type="number" id="coinAmount" placeholder="amount (e.g. 5 or -5)">
            <button class="btn" onclick="updateCoins()">UPDATE BALANCE</button>
        </div>
    </div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAMnrO780tTvrJKbmavBbJ6ztRok-RUQnI",
  authDomain: "chatapp-53b95.firebaseapp.com",
  databaseURL: "https://chatapp-53b95-default-rtdb.firebaseio.com",
  projectId: "chatapp-53b95",
  storageBucket: "chatapp-53b95.firebasestorage.app",
  messagingSenderId: "407903743547",
  appId: "1:407903743547:web:7fc154a755b155125bb61e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LIVE LISTENER FOR WINS
db.ref('archery_wins').limitToLast(20).on('value', (snap) => {
    const box = document.getElementById("winHistory");
    if(!snap.exists()) { box.innerHTML = "no wins yet"; return; }
    
    const wins = [];
    snap.forEach(c => wins.push(c.val()));
    box.innerHTML = wins.reverse().map(w => `
        <div class="win-row">
            <span style="color:#0088ff;">${w.name}</span>
            <span style="color:${w.prize === 'ZONK' ? 'red' : '#0f0'};">${w.prize}</span>
        </div>
    `).join('');
});

function updateCoins() {
    const name = document.getElementById("targetName").value.trim().toLowerCase();
    const amt = parseInt(document.getElementById("coinAmount").value);
    if(!name || isNaN(amt)) return;
    db.ref('wallets/' + name).transaction(curr => (curr || 0) + amt);
    alert("Updated balance for " + name);
}
</script>
</body>
</html>
