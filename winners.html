<!DOCTYPE html>
<html>
<head>
    <title>filagaming - winners list</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; padding: 30px; }
        .member-card { background: #1e1e1e; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 15px; }
        .win-log { font-size: 13px; display: flex; justify-content: space-between; border-top: 1px solid #222; padding: 8px 0; margin-top: 5px; }
        .prize-tag { color: #0f0; font-weight: bold; }
        .back { color: #0088ff; text-decoration: none; margin-bottom: 20px; display: inline-block; }
    </style>
</head>
<body>
    <a href="admin.html" class="back">← back to admin</a>
    <h2 style="color:#0088ff;">winning ids database</h2>
    <div id="list">loading...</div>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAMnrO780tTvrJKbmavBbJ6ztRok-RUQnI",
  authDomain: "chatapp-53b95.firebaseapp.com",
  databaseURL: "https://chatapp-53b95-default-rtdb.firebaseio.com",
  projectId: "chatapp-53b95",
  storageBucket: "chatapp-53b95.firebasestorage.app",
  messagingSenderId: "407903743547",
  appId: "1:407903743547:web:7fc154a755b155125bb61e"
});
const db = firebase.database();

db.ref('archery_wins').once('value', (snap) => {
    if(!snap.exists()) { document.getElementById("list").innerHTML = "No winners yet."; return; }
    
    const wins = []; snap.forEach(c => wins.push(c.val()));
    const grouped = wins.reduce((acc, w) => {
        if(!acc[w.name]) acc[w.name] = [];
        acc[w.name].push(w); return acc;
    }, {});

    document.getElementById("list").innerHTML = Object.keys(grouped).map(name => `
        <div class="member-card">
            <h3 style="margin:0 0 10px 0; color:#0088ff;">${name.toUpperCase()} <span style="color:#777; font-size:14px;">(${grouped[name].length} wins)</span></h3>
            ${grouped[name].reverse().map(w => `
                <div class="win-log">
                    <span>${w.time}</span>
                    <span class="prize-tag">${w.prize}</span>
                    <span style="color:#555;">W: ${w.shot.wind.toFixed(1)}</span>
                </div>
            `).join('')}
        </div>
    `).join('');
});
</script>
</body>
</html>
