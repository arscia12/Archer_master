<!DOCTYPE html>
<html>
<head>
    <title>filagaming - winners</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .win-row { display: flex; justify-content: space-between; padding: 5px 0; border-top: 1px solid #222; font-size: 13px; }
        .btn-back { color: #0088ff; text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <a href="admin.html" class="btn-back">← back to admin</a>
    <h2 style="color:#0088ff;">winning ids hall of fame</h2>
    <div id="list">loading winners...</div>

<script>
firebase.initializeApp({ /* SAME CONFIG AS ABOVE */ });
const db = firebase.database();

db.ref('archery_wins').once('value', (snap) => {
    const wins = []; snap.forEach(c => wins.push(c.val()));
    const grouped = wins.reduce((acc, w) => {
        if(!acc[w.name]) acc[w.name] = [];
        acc[w.name].push(w); return acc;
    }, {});

    document.getElementById("list").innerHTML = Object.keys(grouped).map(name => `
        <div class="card">
            <div style="font-weight:bold; color:#0088ff; margin-bottom:10px;">${name} (${grouped[name].length} wins)</div>
            ${grouped[name].reverse().map(w => `
                <div class="win-row">
                    <span>${w.time}</span>
                    <span style="color:#0f0;">${w.prize}</span>
                    <span style="color:#777;">Wind: ${w.shot.wind.toFixed(1)}</span>
                </div>
            `).join('')}
        </div>
    `).join('');
});
</script>
</body>
</html>
