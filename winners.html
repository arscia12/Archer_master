<!DOCTYPE html>
<html>
<head>
    <title>filagaming - winners database</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0088ff; --bg: #121212; --card: #1e1e1e; --text: #d0d0d0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        .back-link { color: var(--primary); text-decoration: none; font-size: 12px; display: inline-block; margin-bottom: 15px; }
        h2 { color: var(--primary); font-size: 18px; margin-bottom: 20px; }
        
        /* Each ID gets its own row */
        .member-row { background: var(--card); border: 1px solid #333; border-radius: 4px; margin-bottom: 5px; overflow: hidden; }
        .member-trigger { padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .member-trigger:hover { background: #252525; }
        .name { font-size: 13px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .count { font-size: 11px; color: #666; }

        .history-panel { display: none; padding: 0 15px 10px 15px; background: #181818; border-top: 1px solid #282828; }
        .history-panel.open { display: block; }
        
        .log-line { display: grid; grid-template-columns: 1.2fr 1fr 0.8fr; padding: 6px 0; border-bottom: 1px solid #222; font-size: 11px; }
        .log-line:last-child { border-bottom: none; }
        .prize { font-weight: bold; text-align: center; }
        .wind { color: #555; text-align: right; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <a href="admin.html" class="back-link">← back to admin</a>
    <h2>winning ids database</h2>
    <div id="list">
        <p style="font-size:12px; color:#555;">loading all IDs from database...</p>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAMnrO780tTvrJKbmavBbJ6ztRok-RUQnI",
  authDomain: "chatapp-53b95.firebaseapp.com",
  databaseURL: "https://chatapp-53b95-default-rtdb.firebaseio.com",
  projectId: "chatapp-53b95",
  storageBucket: "chatapp-53b95.firebasestorage.app",
  messagingSenderId: "407903743547",
  appId: "1:407903743547:web:7fc154a755b155125bb61e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// The "ON" listener ensures it stays synced with the Admin Panel
db.ref('archery_wins').on('value', (snap) => {
    const listDiv = document.getElementById("list");
    
    if (!snap.exists()) {
        listDiv.innerHTML = "<p style='font-size:12px; color:#555;'>no records found.</p>";
        return;
    }

    const rawData = [];
    snap.forEach(child => {
        rawData.push(child.val());
    });

    // CRITICAL: We group every single name found in the database
    const grouped = {};
    rawData.forEach(win => {
        const id = win.name.toLowerCase();
        if (!grouped[id]) {
            grouped[id] = [];
        }
        grouped[id].push(win);
    });

    // Create the HTML for ALL IDs found
    let htmlContent = "";
    const sortedIds = Object.keys(grouped).sort(); // Alphabetical order

    sortedIds.forEach(id => {
        const wins = grouped[id].reverse(); // Latest win first
        htmlContent += `
            <div class="member-row">
                <div class="member-trigger" onclick="toggle('${id}')">
                    <span class="name">${id}</span>
                    <span class="count">${wins.length} entries ▾</span>
                </div>
                <div class="history-panel" id="panel-${id}">
                    ${wins.map(w => `
                        <div class="log-line">
                            <span style="color:#777;">${w.time}</span>
                            <span class="prize" style="color:${w.prize === 'ZONK' ? '#ff4444' : '#4caf50'};">${w.prize}</span>
                            <span class="wind">W: ${w.shot ? w.shot.wind.toFixed(1) : '0.0'}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    });

    listDiv.innerHTML = htmlContent;
});

function toggle(id) {
    // Replace spaces with hyphens for the ID if needed
    const p = document.getElementById(`panel-${id}`);
    const isOpen = p.classList.contains('open');
    
    // Close others
    document.querySelectorAll('.history-panel').forEach(el => el.classList.remove('open'));
    
    // Open this one
    if (!isOpen) {
        p.classList.add('open');
    }
}
</script>
</body>
</html>
