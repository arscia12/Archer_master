<!DOCTYPE html>
<html>
<head>
    <title>filagaming - member profiles</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0088ff; --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { color: var(--primary); border-bottom: 2px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .search-box { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: white; border-radius: 8px; margin-bottom: 20px; box-sizing: border-box; }
        
        .member-item { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .member-item:hover { border-color: var(--primary); }
        .member-info { display: flex; flex-direction: column; }
        .member-name { font-weight: bold; font-size: 16px; color: var(--primary); }
        .member-status { font-size: 12px; color: #777; margin-top: 4px; }
        
        .coin-badge { background: #2e7d32; color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .zero-coins { background: #c62828; }

        .back-link { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-size: 14px; }
        .stats { font-size: 14px; color: #aaa; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="admin.html" class="back-link">← back to admin dashboard</a>
    <h2>
        member directory
        <span id="memberCount" style="font-size: 14px; color: #777;">0 members</span>
    </h2>
    
    <div class="stats" id="totalCoins">total coins in circulation: 0</div>
    <input type="text" id="searchInput" class="search-box" placeholder="search by name..." onkeyup="filterMembers()">

    <div id="memberContainer">
        <p style="text-align:center; color:#555;">loading database...</p>
    </div>
</div>

<script>
// --- FIREBASE CONFIG ---
const firebaseConfig = {
  apiKey: "AIzaSyAMnrO780tTvrJKbmavBbJ6ztRok-RUQnI",
  authDomain: "chatapp-53b95.firebaseapp.com",
  databaseURL: "https://chatapp-53b95-default-rtdb.firebaseio.com",
  projectId: "chatapp-53b95",
  storageBucket: "chatapp-53b95.firebasestorage.app",
  messagingSenderId: "407903743547",
  appId: "1:407903743547:web:7fc154a755b155125bb61e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allMembers = [];

// Load Members from Firebase
function loadMembers() {
    db.ref('wallets').on('value', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById("memberContainer");
        
        if (!data) {
            container.innerHTML = "<p style='text-align:center; color:#555;'>no members found in database.</p>";
            return;
        }

        allMembers = Object.keys(data).map(name => ({
            name: name,
            coins: data[name]
        }));

        // Sort alphabetically
        allMembers.sort((a, b) => a.name.localeCompare(b.name));

        renderList(allMembers);
        updateStats(allMembers);
    });
}

function renderList(list) {
    const container = document.getElementById("memberContainer");
    container.innerHTML = list.map(m => `
        <div class="member-item">
            <div class="member-info">
                <span class="member-name">${m.name}</span>
                <span class="member-status">registered member</span>
            </div>
            <div class="coin-badge ${m.coins === 0 ? 'zero-coins' : ''}">
                ${m.coins} coins
            </div>
        </div>
    `).join('');
}

function updateStats(list) {
    document.getElementById("memberCount").innerText = list.length + " members";
    const total = list.reduce((sum, m) => sum + (m.coins || 0), 0);
    document.getElementById("totalCoins").innerText = "total coins in circulation: " + total;
}

function filterMembers() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const filtered = allMembers.filter(m => m.name.toLowerCase().includes(query));
    renderList(filtered);
}

// Start listener
loadMembers();
</script>
</body>
</html>
