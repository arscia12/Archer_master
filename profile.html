<!DOCTYPE html>
<html>
<head>
    <title>FILAGAMING - Member Directory</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .directory-container { background: #222; border: 2px solid #0088ff; border-radius: 12px; padding: 25px; width: 480px; margin: 0 auto; }
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #aaa; border-bottom: 2px solid #333; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid #333; }
        .balance { color: #00ff00; font-weight: bold; text-align: right; }
        .back-btn { background: #111; color: #0088ff; border: 1px solid #0088ff; padding: 5px 15px; cursor: pointer; border-radius: 4px; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="directory-container">
        <div class="nav-bar">
            <a href="admin.html" class="back-btn">← BACK TO ADMIN</a>
            <span style="color: #444; font-weight: bold;">LIVE DIRECTORY</span>
        </div>
        
        <h2>Member Balances</h2>
        <table>
            <thead>
                <tr>
                    <th>USERNAME</th>
                    <th style="text-align: right;">BALANCE</th>
                </tr>
            </thead>
            <tbody id="memberList"></tbody>
        </table>
    </div>

<script>
    function refreshTable() {
        const walletData = JSON.parse(localStorage.getItem("archery_wallets")) || {};
        const memberNames = Object.keys(walletData);
        const tbody = document.getElementById("memberList");

        tbody.innerHTML = memberNames.map(name => `
            <tr>
                <td style="font-weight: bold;">${name}</td>
                <td class="balance">${walletData[name]} Coins</td>
            </tr>
        `).join("");
    }

    setInterval(refreshTable, 1000);
    refreshTable();
</script>
</body>
</html>
